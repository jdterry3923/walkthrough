<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>3923 Property Walkthrough</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--navy:#0A1F38;--navy2:#1E314F;--gold:#F9A61A;--lgold:#FBC05E;--r5:#22c55e;--r4:#60a5fa;--r3:#fbbf24;--r2:#f97316;--r1:#ef4444}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:#1a1a1a}
input,textarea,button,select{font-family:inherit}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:var(--navy);padding:8px 12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.tr{display:flex;justify-content:space-between;align-items:center}
.tn{font-size:13px;font-weight:700;color:#fff}
.tb{font-size:10px;color:var(--lgold)}
.ts{font-size:22px;font-weight:800;text-align:right}
.tss{font-size:9px;color:#aaa;text-align:right}
.chips{display:flex;gap:3px;margin-top:6px;overflow-x:auto;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.ch{padding:3px 9px;border-radius:10px;border:none;cursor:pointer;font-size:10px;font-weight:600;white-space:nowrap;background:rgba(255,255,255,.1);color:#ccc}
.ch.a{background:var(--gold);color:var(--navy)}
.ch.d{background:rgba(34,197,94,.2);color:var(--r5)}
.cnt{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:56px}
.nv{position:sticky;bottom:0;z-index:50;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:5px 0}
.nb{display:flex;flex-direction:column;align-items:center;gap:0;background:none;border:none;cursor:pointer;padding:3px 6px;color:#bbb;position:relative}
.nb.a{color:var(--navy)}
.nb .ic{font-size:16px}.nb .lb{font-size:9px}.nb.a .lb{font-weight:700}
.bg{position:absolute;top:0;right:-2px;background:var(--r1);color:#fff;font-size:8px;font-weight:700;border-radius:8px;padding:0 4px;line-height:14px}
.pg{padding:14px;max-width:480px;margin:0 auto;width:100%}
.fl{margin-bottom:8px}
.fl label{font-size:10px;font-weight:600;color:#888;display:block;margin-bottom:2px}
.fl input,.fl textarea,.fl select{width:100%;padding:9px;border-radius:7px;border:1px solid #ddd;font-size:13px;box-sizing:border-box}
.fl textarea{resize:vertical}
.bt{width:100%;padding:13px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer}
.bt:active{transform:scale(.98)}
.bn{background:var(--navy);color:#fff}
.bg2{background:var(--gold);color:var(--navy)}
.bo{background:#fff;color:#888;border:1px solid #ddd}
.br{display:flex;gap:8px;margin-top:8px}
.sh{padding:10px 12px 6px;border-bottom:2px solid var(--gold)}
.st2{font-size:15px;font-weight:700;color:var(--navy)}
.ck{padding:5px 12px;border-bottom:1px solid #f5f5f5;font-size:13px;color:#333;display:flex;gap:6px}
.ck .dt{color:var(--gold);font-weight:700;flex-shrink:0}
.sa{padding:12px;background:#fafafa;border-bottom:1px solid #eee}
.sl{font-size:12px;font-weight:600;color:var(--navy);margin-bottom:6px}
.rbs{display:flex;gap:4px}
.rb{width:40px;height:40px;border-radius:8px;border:none;cursor:pointer;font-size:15px;font-weight:700;background:#f0f0f0;color:#aaa;transition:all .12s}
.rb.s1{background:var(--r1);color:#fff;transform:scale(1.08)}
.rb.s2{background:var(--r2);color:#fff;transform:scale(1.08)}
.rb.s3{background:var(--r3);color:#fff;transform:scale(1.08)}
.rb.s4{background:var(--r4);color:#fff;transform:scale(1.08)}
.rb.s5{background:var(--r5);color:#fff;transform:scale(1.08)}
.rs{width:34px;height:34px;font-size:14px;border-radius:7px}
.bkr{display:flex;gap:6px;margin-bottom:10px}
.bk{flex:1;padding:8px 0;border-radius:8px;border:none;cursor:pointer;font-size:11px;font-weight:700;background:#f0f0f0;color:#888;text-align:center}
.bk.a{background:var(--gold);color:#fff}
.tg{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;white-space:nowrap}
.tg.on{background:var(--gold);color:#fff;border-color:var(--gold)}
.tg.nv2{background:var(--navy);color:#fff;border-color:var(--navy)}
.rtb{display:flex;gap:3px;padding:8px 12px;border-bottom:2px solid var(--gold);overflow-x:auto}
.rt{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;text-align:center;font-size:12px;font-weight:700;background:#f0f0f0;color:#888;white-space:nowrap}
.rt.a{background:var(--navy);color:#fff}
.rtp{font-size:9px;font-weight:400;opacity:.7}
.ar{padding:6px 12px;border-radius:7px;border:1px dashed #ccc;cursor:pointer;font-size:12px;color:#aaa;background:none;white-space:nowrap}
.it{padding:9px 12px;border-bottom:1px solid #eee}
.it.w{background:#fffbeb}.it.dg{background:#fef2f2}
.itp{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.ii{flex:1;min-width:0}
.ic2{font-size:10px;color:#bbb;font-weight:700}
.il{font-size:13px;line-height:1.3}
.ia{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.mb{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.md{background:#fff;width:100%;max-width:480px;border-radius:14px 14px 0 0;padding:18px;max-height:80vh;overflow-y:auto}
.mt{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px}
.ec{background:linear-gradient(135deg,#0A1F38,#1E314F);border-radius:12px;padding:18px;margin-bottom:14px;color:#fff}
.pi{padding:7px 9px;border-left:3px solid;margin-bottom:3px;background:#fafafa;border-radius:0 5px 5px 0}
.tt{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--r5);color:#fff;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;z-index:200;opacity:0;transition:opacity .3s}
.tt.show{opacity:1}
.thumbs{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.thumb{width:52px;height:52px;border-radius:6px;object-fit:cover;border:1px solid #ddd;position:relative;cursor:pointer}
.thumb-wrap{position:relative;display:inline-block}
.thumb-x{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--r1);color:#fff;font-size:10px;line-height:16px;text-align:center;cursor:pointer;border:none;font-weight:700}
.pb{font-size:11px;padding:4px 10px;border-radius:6px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer;display:inline-flex;align-items:center;gap:4px}
.pb.has{background:#e0f2fe;border-color:#60a5fa;color:#1e40af}
.upload-progress{margin-top:10px;background:#eee;border-radius:8px;overflow:hidden;height:6px}
.upload-bar{height:100%;background:var(--r5);transition:width .3s;border-radius:8px}
</style>
</head>
<body>
<div id="app" class="app"></div>
<div id="toast" class="tt"></div>
<input type="file" id="cam" accept="image/*" capture="environment" style="display:none" multiple>
<script>
// ─── CONFIG ──────────────────────────────────────────
const SEC=[
{id:"ext",code:"1",name:"Exterior & Arrival",items:["Building exterior / façade condition","Signage — visible, lit, brand-compliant","Parking lot — condition, striping, lighting","Landscaping and curb appeal","Entrance — clean, well-lit, doors functional","Exterior lighting operational","Trash receptacles clean, not overflowing","Overall curb appeal — would you pull in?"]},
{id:"lob",code:"2",name:"Lobby & Check-In",items:["First impression — smell, temp, lighting, music","Floors — condition, cleanliness, transitions","Front desk — clean, organized, staffed","Staff — uniform, greeting, professionalism","Lobby furniture and décor — condition","Elevator — cab condition, buttons, lighting","Public restrooms — clean, stocked, fixtures","Wayfinding signage — clear and current","Business center / market / vending","Ambient feel — would you sit in this lobby?"]},
{id:"fb",code:"3",name:"F&B / Breakfast",items:["Serving area — clean, organized, stocked","Food presentation and quality","Equipment — coffee, toaster, waffle maker","Dining area — tables, chairs, cleanliness","Kitchen / prep — food safety, temps, storage","Staff hygiene and health postings","Pest evidence — none observed"]},
{id:"fit",code:"4",name:"Fitness / Pool",items:["Fitness equipment — functional, clean","Fitness center — mirrors, TV, supplies","Pool — water clarity, chemical compliance","Pool deck and furniture condition","Safety signage and equipment","Towels stocked, hours posted, access works"]},
{id:"cor",code:"5",name:"Corridors & Common",items:["Corridor flooring — stains, wear, transitions","Walls — scuffs, marks, paint condition","Lighting — all bulbs, fixture condition","Exit signs and emergency lighting","Ice / vending areas — clean, functional","Stairwells — clean, lit, signage","Elevator lobbies on guest floors","HK carts — tidy, stocked, not blocking","Noise — HVAC, neighbors, exterior"]},
{id:"boh",code:"6",name:"Back of House / MEP / Safety",items:["HK storage — organized, stocked, clean","Laundry — equipment, organization","Chemical storage — labeled, SDS, compliant","Maintenance shop — organized, tools","Employee areas — break room, lockers","Office — organized, secure, data protected","Waste / dumpster — contained, clean","Electrical panels — labeled, accessible","Generator — tested, fuel, logs current","Boiler / water heater — condition, age","HVAC units — filters, PM schedule","Roof — last inspection, visible issues","Plumbing — no leaks, pressure adequate","Elevator certificate current","PM program — documented, on schedule","Fire alarm — tested, panel clear","Sprinkler — inspections current","Fire extinguishers — tagged, accessible","Emergency exits — clear, marked, lit","Emergency lighting — all functional","ADA compliance — rooms, signage, paths","CCTV and key control procedures"]}
];
const RI=["Door, lock, hardware, peephole","First impression — smell, temp, cleanliness","Carpet / flooring condition","Walls, ceiling, baseboards","Bed — linens, mattress, pillows, frame","Furniture — nightstands, desk, dresser","TV, remote, programming","HVAC — functional, quiet, filter","Windows, blinds, curtains","Closet — hangers, iron, safe, rack","Lighting — all fixtures, outlets, USB","Bathroom — cleanliness, fixtures, function","Grout, caulking, tile condition","Amenities — toiletries, towels, dryer","Mini-fridge / coffee maker","Odors — none present","In-room collateral current"];
const AQ=["What stood out positively?","What would embarrass us in front of an investor?","Worse since last visit?","Improved since last visit?","Where is the GM winning?","Where does the GM need support?","Biggest threat to guest satisfaction?","Fix before we leave today:"];

// *** PASTE YOUR GOOGLE APPS SCRIPT URL HERE ***
const UPLOAD_URL="";

// ─── STATE ───────────────────────────────────────────
const DEF={v:"setup",si:0,ri:0,nk:null,ak:null,info:{property:"",brand:"",date:new Date().toISOString().split("T")[0],gm:"",agm:"",rmgr:"",inspector:"",occ:"",qa:""},rat:{},notes:{},acts:{},assess:{},rooms:[{num:"",type:""},{num:"",type:""},{num:"",type:""}],fu:{d30:"",d90:"",next:""},uploaded:false};
let st=JSON.parse(JSON.stringify(DEF));
// Photos stored separately (base64 can be large, keep out of main state)
let photos={}; // { "ext": [{data:"base64...",label:"ext_1"}], "r0": [...] }
try{const s=localStorage.getItem("wt5");if(s)Object.assign(st,JSON.parse(s));}catch(e){}
try{const p=localStorage.getItem("wt5p");if(p)photos=JSON.parse(p);}catch(e){}

function sv(){try{localStorage.setItem("wt5",JSON.stringify(st));}catch(e){}}
function svp(){try{localStorage.setItem("wt5p",JSON.stringify(photos));}catch(e){toast("⚠ Storage full — photos may not save");}}
function U(u){Object.assign(st,u);sv();R();}
function toast(m){const t=document.getElementById("toast");t.textContent=m;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2000);}
function E(s){return(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

// ─── SCORING ─────────────────────────────────────────
function rsc(i){let s=0,t=0;for(let j=0;j<RI.length;j++){const r=st.rat[`r${i}-${j}`];if(r){s+=r;t++;}}return{s,t};}
function tot(){let s=0,mx=0;SEC.forEach(c=>{const r=st.rat[c.id];if(r){s+=r;mx+=5;}});st.rooms.forEach((_,i)=>{const c=rsc(i);if(c.t>0){s+=c.s;mx+=c.t*5;}});return{s,mx,pct:mx>0?Math.round(s/mx*100):0};}
function fl(){const f=[];SEC.forEach(c=>{const r=st.rat[c.id];if(r&&r<=3)f.push({k:c.id,sec:c.name,code:c.code,item:c.name,r,note:st.notes[c.id]||"",act:st.acts[c.id]||{}});});st.rooms.forEach((_,i)=>{RI.forEach((item,j)=>{const k=`r${i}-${j}`,r=st.rat[k];if(r&&r<=3)f.push({k,sec:"Room "+(st.rooms[i].num||i+1),code:`R${i+1}.${j+1}`,item,r,note:st.notes[k]||"",act:st.acts[k]||{}});});});return f;}
function pc(p){return p>=90?"var(--r5)":p>=75?"var(--r4)":p>=60?"var(--r3)":"var(--r1)";}
function pl(p){return p>=90?"Excellent":p>=75?"Good":p>=60?"Fair":"Unsatisfactory";}
function pcnt(secId){return(photos[secId]||[]).length;}

// ─── PHOTO HANDLING ──────────────────────────────────
function compressImg(file,maxW,quality){
  return new Promise((res)=>{
    const reader=new FileReader();
    reader.onload=function(e){
      const img=new Image();
      img.onload=function(){
        const canvas=document.createElement("canvas");
        let w=img.width,h=img.height;
        if(w>maxW){h=Math.round(h*(maxW/w));w=maxW;}
        canvas.width=w;canvas.height=h;
        const ctx=canvas.getContext("2d");
        ctx.drawImage(img,0,0,w,h);
        res(canvas.toDataURL("image/jpeg",quality));
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function takePhoto(secId){
  const cam=document.getElementById("cam");
  cam.onchange=async function(){
    if(!this.files||!this.files.length)return;
    for(let i=0;i<this.files.length;i++){
      const compressed=await compressImg(this.files[i],800,0.7);
      if(!photos[secId])photos[secId]=[];
      photos[secId].push({data:compressed,ts:Date.now()});
    }
    svp();R();toast(`📷 ${this.files.length} photo${this.files.length>1?"s":""} added`);
    this.value="";
  };
  cam.click();
}

function delPhoto(secId,idx){
  if(photos[secId]){photos[secId].splice(idx,1);if(!photos[secId].length)delete photos[secId];svp();R();}
}

function photoThumbs(secId){
  const p=photos[secId]||[];
  if(!p.length)return"";
  let h=`<div class="thumbs">`;
  p.forEach((ph,i)=>{h+=`<div class="thumb-wrap"><img class="thumb" src="${ph.data}" onclick="viewPhoto('${secId}',${i})"><button class="thumb-x" onclick="event.stopPropagation();delPhoto('${secId}',${i})">×</button></div>`;});
  h+=`</div>`;return h;
}

function viewPhoto(secId,idx){
  const ph=photos[secId]?.[idx];
  if(!ph)return;
  const w=window.open();
  w.document.write(`<img src="${ph.data}" style="max-width:100%;height:auto">`);
}

// ─── RENDER ──────────────────────────────────────────
function R(){
  const ce=document.querySelector(".cnt");const sy=ce?ce.scrollTop:0;
  const t=tot(),f=fl();let h="";
  if(st.v!=="setup"){
    h+=`<div class="topbar"><div class="tr"><div><div class="tn">${E(st.info.property)||"Property Walkthrough"}</div><div class="tb">3923 Management</div></div><div><div class="ts" style="color:${t.mx>0?pc(t.pct):"#666"}">${t.mx>0?t.pct+"%":"—"}</div><div class="tss">${t.mx>0?t.s+"/"+t.mx:"Start scoring"}</div></div></div>`;
    if(st.v==="walk"){h+=`<div class="chips">`;SEC.forEach((c,i)=>{const r=st.rat[c.id];h+=`<button class="ch${st.si===i?" a":""}${r?" d":""}" onclick="U({si:${i}})">${c.code}${r?" ✓":""}</button>`;});h+=`</div>`;}
    h+=`</div>`;
  }
  h+=`<div class="cnt">`;
  if(st.v==="setup")h+=vSetup();else if(st.v==="walk")h+=vWalk();else if(st.v==="rooms")h+=vRooms();else if(st.v==="assess")h+=vAssess();else if(st.v==="plan")h+=vPlan(f);else if(st.v==="export")h+=vExport(t,f);
  h+=`</div>`;
  h+=`<div class="nv">`;[["setup","⚙️","Setup"],["walk","🏨","Walk"],["rooms","🛏️","Rooms"],["assess","💬","Assess"],["plan","📋","Plan"],["export","📤","Export"]].forEach(([v,ic,lb])=>{h+=`<button class="nb${st.v===v?" a":""}" onclick="U({v:'${v}'})"><span class="ic">${ic}</span><span class="lb">${lb}</span>${v==="plan"&&f.length>0?`<span class="bg">${f.length}</span>`:""}</button>`;});h+=`</div>`;
  if(st.nk)h+=mNote();if(st.ak)h+=mAct();
  document.getElementById("app").innerHTML=h;
  const nc=document.querySelector(".cnt");if(nc)nc.scrollTop=sy;
  if(st.nk){const ta=document.getElementById("nta");if(ta){ta.focus();ta.selectionStart=ta.value.length;}}
}

// ─── VIEWS ───────────────────────────────────────────
function vSetup(){
  let h=`<div class="pg"><div style="text-align:center;margin-bottom:16px"><div style="font-size:22px;font-weight:800;color:var(--navy)">Property Walkthrough</div><div style="font-size:12px;color:var(--gold);font-weight:600">3923 Management</div></div>`;
  [["property","Property Name"],["brand","Brand"],["date","Date","date"],["gm","General Manager"],["agm","Accountability Partner GM"],["rmgr","Regional Manager"],["inspector","Your Name"],["occ","Today's Occupancy"],["qa","Last Walkthrough Score / Date"]].forEach(([k,l,t])=>{h+=`<div class="fl"><label>${l}</label><input type="${t||"text"}" value="${E(st.info[k])}" oninput="ui('${k}',this.value)"></div>`;});
  h+=`<button class="bt bn" style="margin-top:10px" onclick="U({v:'walk'})">Start Walkthrough →</button>`;
  h+=`<button class="bt bo" style="margin-top:8px" onclick="resetAll()">Reset All Data</button>`;
  h+=`<div style="text-align:center;margin-top:12px;font-size:10px;color:#bbb">Data saves automatically to this device.</div></div>`;return h;
}

function vWalk(){
  const c=SEC[st.si],r=st.rat[c.id],ph=pcnt(c.id);
  let h=`<div style="max-width:480px;margin:0 auto"><div class="sh"><div style="display:flex;justify-content:space-between;align-items:center"><div class="st2">${c.code}. ${c.name}</div>`;
  if(r)h+=`<div style="font-size:20px;font-weight:800;color:${pc(r*20)}">${r}/5</div>`;
  h+=`</div></div>`;
  c.items.forEach(item=>{h+=`<div class="ck"><span class="dt">•</span><span>${E(item)}</span></div>`;});
  h+=`<div class="sa"><div class="sl">Rate this section overall</div><div class="rbs">`;
  for(let n=1;n<=5;n++)h+=`<button class="rb${r===n?" s"+n:""}" onclick="rs('${c.id}',${n})">${n}</button>`;
  h+=`</div>`;
  if(r&&r<=3){const a=st.acts[c.id]||{};h+=`<div style="margin-top:10px"><div class="sl">Timeline for repair</div><div class="bkr">`;[["now","Immediately"],["M","30 Days"],["Q","90 Days"],["C","CapEx"]].forEach(([v,l])=>{h+=`<button class="bk${a.bucket===v?" a":""}" onclick="sa('${c.id}','${v}')">${l}</button>`;});h+=`</div></div>`;}
  h+=`<div style="margin-top:8px"><div class="sl">Comments / Action Items</div><textarea rows="3" placeholder="What did you see? What needs to happen?" oninput="sn('${c.id}',this.value)" style="width:100%;padding:8px;border-radius:7px;border:1px solid #ddd;font-size:13px;box-sizing:border-box;resize:vertical">${E(st.notes[c.id]||"")}</textarea></div>`;
  h+=`<div style="margin-top:8px"><button class="pb${ph>0?" has":""}" onclick="takePhoto('${c.id}')">📷 ${ph>0?"Add More ("+ph+")":"Take Photo"}</button></div>`;
  h+=photoThumbs(c.id);
  h+=`</div>`;
  h+=`<div class="br" style="padding:12px">`;
  if(st.si>0)h+=`<button class="bt bo" style="flex:1" onclick="U({si:${st.si-1}})">← Prev</button>`;
  if(st.si<SEC.length-1)h+=`<button class="bt bn" style="flex:1" onclick="U({si:${st.si+1}})">Next →</button>`;
  else h+=`<button class="bt bg2" style="flex:1" onclick="U({v:'rooms'})">Rooms →</button>`;
  h+=`</div></div>`;return h;
}

function vRooms(){
  const i=st.ri,rm=st.rooms[i]||{num:"",type:""},s=rsc(i),p=s.t>0?Math.round(s.s/(s.t*5)*100):null,ph=pcnt(`r${i}`);
  let h=`<div style="max-width:480px;margin:0 auto"><div class="rtb">`;
  st.rooms.forEach((_,j)=>{const rs2=rsc(j),rp=rs2.t>0?Math.round(rs2.s/(rs2.t*5)*100):null,rn=st.rooms[j].num;h+=`<button class="rt${st.ri===j?" a":""}" onclick="U({ri:${j}})">${rn||"Rm "+(j+1)}${rp!==null?`<div class="rtp">${rp}%</div>`:""}</button>`;});
  if(st.rooms.length<8)h+=`<button class="ar" onclick="addRm()">+</button>`;
  h+=`</div>`;
  h+=`<div style="padding:8px 12px;display:flex;gap:8px;border-bottom:1px solid #eee"><div class="fl" style="flex:1;margin:0"><label>Room # *</label><input value="${E(rm.num)}" placeholder="214" oninput="ur(${i},'num',this.value)"></div><div class="fl" style="flex:1;margin:0"><label>Type</label><select onchange="ur(${i},'type',this.value)"><option value="">Select</option>${["King","Double","Suite","ADA","Other"].map(t=>`<option${rm.type===t?" selected":""}>${t}</option>`).join("")}</select></div></div>`;
  h+=`<div style="padding:4px 12px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:10px;color:${s.t===RI.length?"var(--r5)":"#bbb"};font-weight:600">${s.t}/${RI.length} scored${s.t===RI.length?" ✓":""}</div>`;
  if(p!==null)h+=`<div style="font-size:13px;font-weight:700;color:${pc(p)};background:${pc(p)}15;padding:2px 8px;border-radius:10px">${p}%</div>`;
  h+=`</div>`;
  RI.forEach((item,j)=>{
    const k=`r${i}-${j}`,r=st.rat[k],hn=st.notes[k],ha=st.acts[k];
    h+=`<div class="it${r&&r<=2?" dg":r===3?" w":""}"><div class="itp"><div class="ii"><div class="ic2">R${i+1}.${j+1}</div><div class="il">${E(item)}</div></div><div class="rbs">`;
    for(let n=1;n<=5;n++)h+=`<button class="rb rs${r===n?" s"+n:""}" onclick="rt('r${i}-${j}',${n})">${n}</button>`;
    h+=`</div></div>`;
    if(r){h+=`<div class="ia"><button class="tg${hn?" nv2":""}" onclick="U({nk:'r${i}-${j}'})">${hn?"✎ Note":"+ Note"}</button>`;if(r<=3)h+=`<button class="tg${ha&&ha.bucket?" on":""}" onclick="U({ak:'r${i}-${j}'})">${ha&&ha.bucket?ha.bucket+(ha.owner?" · "+E(ha.owner):""):"+ Action"}</button>`;h+=`</div>`;}
    h+=`</div>`;
  });
  h+=`<div style="padding:10px 12px"><button class="pb${ph>0?" has":""}" onclick="takePhoto('r${i}')">📷 ${ph>0?"Add More ("+ph+")":"Take Photo"}</button></div>`;
  h+=photoThumbs(`r${i}`);
  h+=`<div class="br" style="padding:12px"><button class="bt bo" style="flex:1" onclick="U({v:'walk'})">← Walk</button><button class="bt bn" style="flex:1" onclick="U({v:'assess'})">Assessment →</button></div></div>`;return h;
}

function vAssess(){
  let h=`<div class="pg"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px">Overall Assessment</div><div style="font-size:11px;color:#999;margin-bottom:14px">Complete as a team after the walkthrough.</div>`;
  AQ.forEach((q,i)=>{h+=`<div style="margin-bottom:10px"><label style="font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:3px">${E(q)}</label><textarea rows="2" placeholder="..." oninput="ua(${i},this.value)">${E(st.assess[i]||"")}</textarea></div>`;});
  h+=`<button class="bt bn" onclick="U({v:'plan'})">View Action Plan →</button></div>`;return h;
}

function vPlan(f){
  let h=`<div class="pg"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px">Action Plan</div><div style="font-size:11px;color:#999;margin-bottom:10px">${f.length} items flagged.</div>`;
  [["now","Immediately","#fee2e2","#991b1b"],["M","30 Days","#fef3c7","#92400e"],["Q","90 Days","#dbeafe","#1e40af"],["C","CapEx","#f3e8ff","#6b21a8"]].forEach(([b,lb,bg,fg])=>{
    const items=f.filter(x=>x.act.bucket===b);
    h+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;padding:5px 9px;border-radius:5px;background:${bg};color:${fg};margin-bottom:5px">${lb} (${items.length})</div>`;
    if(!items.length)h+=`<div style="font-size:11px;color:#ddd;padding:3px 9px">None</div>`;
    items.forEach(x=>{const bc=x.r<=1?"var(--r1)":x.r===2?"var(--r2)":"var(--r3)";h+=`<div class="pi" style="border-color:${bc}"><div style="font-size:12px;font-weight:600;color:var(--navy)"><span style="color:#bbb">${x.code}</span> ${E(x.item)}</div><div style="font-size:10px;color:#999;margin-top:1px">Rating: ${x.r} · ${E(x.sec)}${x.act.owner?" · "+E(x.act.owner):""}</div>${x.note?`<div style="font-size:10px;color:#777;font-style:italic;margin-top:1px">${E(x.note)}</div>`:""}</div>`;});
    h+=`</div>`;
  });
  const u=f.filter(x=>!x.act.bucket);if(u.length){h+=`<div style="margin-bottom:14px"><div style="font-size:12px;font-weight:700;padding:5px 9px;border-radius:5px;background:#fef2f2;color:#991b1b;margin-bottom:5px">Unassigned (${u.length})</div>`;u.forEach(x=>{h+=`<div class="pi" style="border-color:var(--r2);display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:12px;font-weight:600;color:var(--navy)"><span style="color:#bbb">${x.code}</span> ${E(x.item)}</div><div style="font-size:10px;color:#999">Rating: ${x.r}</div></div><button class="tg" onclick="U({ak:'${x.k}'})">Assign</button></div>`;});h+=`</div>`;}
  h+=`<div class="br"><button class="bt bo" style="flex:1" onclick="U({v:'assess'})">← Assess</button><button class="bt bg2" style="flex:1" onclick="U({v:'export'})">Export →</button></div></div>`;return h;
}

function vExport(t,f){
  let tp=0;Object.values(photos).forEach(a=>{tp+=a.length;});
  let h=`<div class="pg"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px">Export Report</div>`;
  h+=`<div class="ec"><div style="font-size:12px;color:var(--lgold);margin-bottom:3px">${E(st.info.property)||"Property"}</div><div style="font-size:42px;font-weight:800;color:${pc(t.pct)}">${t.pct}%</div><div style="font-size:13px;color:#ccc">${t.s} / ${t.mx} — ${pl(t.pct)}</div><div style="font-size:11px;color:#999;margin-top:3px">${f.length} action items · ${tp} photos</div></div>`;
  h+=`<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px">Section Scores</div><div style="margin-bottom:14px">`;
  SEC.forEach(c=>{const r=st.rat[c.id],ph=pcnt(c.id);h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:12px"><span>${c.code}. ${c.name}${ph>0?" 📷"+ph:""}</span>${r?`<span style="font-weight:700;color:${pc(r*20)}">${r}/5</span>`:`<span style="color:#ccc">—</span>`}</div>`;});
  st.rooms.forEach((rm,i)=>{const s=rsc(i);if(s.t>0){const p=Math.round(s.s/(s.t*5)*100),ph=pcnt(`r${i}`);h+=`<div style="display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:12px"><span>Room ${rm.num||i+1} (${rm.type||"—"})${ph>0?" 📷"+ph:""}</span><span style="font-weight:700;color:${pc(p)}">${p}%</span></div>`;}});
  h+=`</div>`;
  h+=`<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px">Follow-Up Schedule</div>`;
  [["d30","30-Day Check-In"],["d90","90-Day Check-In"],["next","Next Full Walkthrough"]].forEach(([k,l])=>{h+=`<div class="fl"><label>${l}</label><input type="date" value="${st.fu[k]}" oninput="uf('${k}',this.value)"></div>`;});
  h+=`<button class="bt" style="margin-top:14px;background:var(--r5);color:#fff" onclick="uploadAll()">☁ Upload Report${tp>0?" & "+tp+" Photos":""}</button>`;
  h+=`<div id="uprog"></div>`;
  if(st.uploaded)h+=`<div style="text-align:center;margin-top:8px;font-size:11px;color:var(--r5);font-weight:600">✓ Report uploaded successfully</div>`;
  h+=`<div class="br" style="margin-top:8px"><button class="bt bo" style="flex:1" onclick="cpRpt()">📋 Copy</button><button class="bt bo" style="flex:1" onclick="dlRpt()">⬇ Download</button></div>`;
  h+=`<div style="text-align:center;margin-top:12px;font-size:10px;color:#bbb">Upload sends all data + photos. Copy/Download are text-only backups.</div>`;
  h+=`</div>`;return h;
}

// ─── MODALS ──────────────────────────────────────────
function mNote(){return `<div class="mb" onclick="U({nk:null})"><div class="md" onclick="event.stopPropagation()"><div class="mt">Notes</div><textarea id="nta" placeholder="What did you see?" oninput="un(this.value)" style="width:100%;min-height:70px;border-radius:8px;border:1px solid #ddd;padding:10px;font-size:14px;box-sizing:border-box;resize:vertical">${E(st.notes[st.nk]||"")}</textarea><button class="bt bn" style="margin-top:8px" onclick="U({nk:null})">Done</button></div></div>`;}
function mAct(){const a=st.acts[st.ak]||{};let h=`<div class="mb" onclick="U({ak:null})"><div class="md" onclick="event.stopPropagation()"><div class="mt">Action Item</div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:5px">Timeline</div><div class="bkr">`;[["now","Immediately"],["M","30 Days"],["Q","90 Days"],["C","CapEx"]].forEach(([v,l])=>{h+=`<button class="bk${a.bucket===v?" a":""}" onclick="uaf('bucket','${v}')">${l}</button>`;});h+=`</div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:4px">Owner</div><input value="${E(a.owner||"")}" placeholder="Who owns this?" oninput="uaf('owner',this.value)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:14px;box-sizing:border-box;margin-bottom:8px"><button class="bt bn" onclick="U({ak:null})">Done</button></div></div>`;return h;}

// ─── ACTIONS ─────────────────────────────────────────
function rt(k,v){st.rat[k]=st.rat[k]===v?undefined:v;sv();R();}
function rs(id,v){st.rat[id]=st.rat[id]===v?undefined:v;sv();R();}
function ui(k,v){st.info[k]=v;sv();}
function un(v){st.notes[st.nk]=v;sv();}
function sn(id,v){st.notes[id]=v;sv();}
function sa(id,v){if(!st.acts[id])st.acts[id]={};st.acts[id].bucket=st.acts[id].bucket===v?undefined:v;sv();R();}
function uaf(f,v){if(!st.acts[st.ak])st.acts[st.ak]={};st.acts[st.ak][f]=v;sv();if(f!=="owner")R();}
function ua(i,v){st.assess[i]=v;sv();}
function uf(k,v){st.fu[k]=v;sv();}
function ur(i,f,v){st.rooms[i][f]=v;sv();if(f!=="num")R();}
function addRm(){st.rooms.push({num:"",type:""});st.ri=st.rooms.length-1;sv();R();}
function resetAll(){if(confirm("Reset ALL data including photos? This cannot be undone.")){localStorage.removeItem("wt5");localStorage.removeItem("wt5p");st=JSON.parse(JSON.stringify(DEF));photos={};R();}}

// ─── REPORT GEN ──────────────────────────────────────
function genRpt(){
  const t=tot(),f=fl();
  let r=`3923 MANAGEMENT — PROPERTY WALKTHROUGH\n${"=".repeat(50)}\n\nProperty: ${st.info.property}\nBrand: ${st.info.brand}\nDate: ${st.info.date}\nGM: ${st.info.gm}\nAccountability GM: ${st.info.agm}\nRegional Mgr: ${st.info.rmgr}\nInspector: ${st.info.inspector}\nOccupancy: ${st.info.occ}\nLast Walkthrough: ${st.info.qa}\n\nOVERALL SCORE: ${t.s}/${t.mx} (${t.pct}%) — ${pl(t.pct)}\n${"-".repeat(50)}\n\nSECTION SCORES\n`;
  SEC.forEach(c=>{const v=st.rat[c.id];r+=`  ${c.code}. ${c.name}: ${v?v+"/5":"—"}\n`;if(st.notes[c.id])r+=`     Notes: ${st.notes[c.id]}\n`;const a=st.acts[c.id];if(a&&a.bucket)r+=`     Timeline: ${a.bucket}\n`;r+=`     Photos: ${pcnt(c.id)}\n`;});
  r+=`\nROOM SCORES\n`;
  st.rooms.forEach((rm,i)=>{const s=rsc(i);if(s.t>0){const p=Math.round(s.s/(s.t*5)*100);r+=`\n  Room ${rm.num||i+1} (${rm.type||"—"}): ${s.s}/${s.t*5} (${p}%)\n`;RI.forEach((item,j)=>{const k=`r${i}-${j}`,rv=st.rat[k];if(rv){r+=`    R${i+1}.${j+1} [${rv}] ${item}`;if(st.notes[k])r+=` — ${st.notes[k]}`;const a=st.acts[k];if(a&&a.bucket)r+=` [${a.bucket}${a.owner?" "+a.owner:""}]`;r+="\n";}});r+=`    Photos: ${pcnt("r"+i)}\n`;}});
  r+=`\n${"=".repeat(50)}\nACTION PLAN (${f.length} items)\n${"=".repeat(50)}\n\n`;
  ["now","M","Q","C"].forEach(b=>{const lb=b==="now"?"IMMEDIATELY":b==="M"?"30 DAYS":b==="Q"?"90 DAYS":"CAPEX";const items=f.filter(x=>x.act.bucket===b);if(items.length){r+=`${lb} (${items.length})\n`;items.forEach(x=>{r+=`  [${x.r}] ${x.code} ${x.item}${x.act.owner?" — "+x.act.owner:""}\n`;if(x.note)r+=`      ${x.note}\n`;});r+="\n";}});
  r+=`${"=".repeat(50)}\nASSESSMENT\n${"=".repeat(50)}\n\n`;AQ.forEach((q,i)=>{r+=`${q}\n${st.assess[i]||"(not completed)"}\n\n`;});
  r+=`FOLLOW-UP\n30-Day: ${st.fu.d30||"TBD"}\n90-Day: ${st.fu.d90||"TBD"}\nNext Walk: ${st.fu.next||"TBD"}\n\n"We take care of people." — Genesis 39:23\n`;return r;
}
function cpRpt(){navigator.clipboard.writeText(genRpt()).then(()=>toast("📋 Copied!")).catch(()=>{const t=document.createElement("textarea");t.value=genRpt();document.body.appendChild(t);t.select();document.execCommand("copy");document.body.removeChild(t);toast("📋 Copied!");});}
function dlRpt(){const b=new Blob([genRpt()],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`walkthrough_${(st.info.property||"report").replace(/\s+/g,"_")}_${st.info.date}.txt`;a.click();URL.revokeObjectURL(u);}

// ─── UPLOAD ──────────────────────────────────────────
async function uploadAll(){
  const prog=document.getElementById("uprog");
  if(prog)prog.innerHTML=`<div class="upload-progress"><div class="upload-bar" style="width:10%"></div></div><div style="text-align:center;font-size:11px;color:#888;margin-top:4px">Preparing upload...</div>`;
  toast("Preparing...");

  // Build full payload
  const payload={
    timestamp:new Date().toISOString(),
    info:st.info,
    ratings:st.rat,
    notes:st.notes,
    actions:st.acts,
    rooms:st.rooms,
    assessments:st.assess,
    followUp:st.fu,
    score:tot(),
    flagCount:fl().length,
    flags:fl(),
    sections:SEC.map(c=>({id:c.id,code:c.code,name:c.name,rating:st.rat[c.id]||null,notes:st.notes[c.id]||"",action:st.acts[c.id]||null,photoCount:pcnt(c.id)})),
    roomDetails:st.rooms.map((rm,i)=>{const s=rsc(i);return{num:rm.num,type:rm.type,scored:s.t,total:RI.length,score:s.s,maxScore:s.t*5,pct:s.t>0?Math.round(s.s/(s.t*5)*100):0,photoCount:pcnt("r"+i),items:RI.map((item,j)=>{const k=`r${i}-${j}`;return{item,rating:st.rat[k]||null,note:st.notes[k]||"",action:st.acts[k]||null};})};}).filter(r=>r.scored>0),
    photos:photos
  };

  if(!UPLOAD_URL){
    // No backend configured — save JSON locally
    if(prog)prog.innerHTML=`<div class="upload-progress"><div class="upload-bar" style="width:100%"></div></div>`;
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const u=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=u;
    a.download=`walkthrough_${(st.info.property||"report").replace(/\s+/g,"_")}_${st.info.date}.json`;
    a.click();
    URL.revokeObjectURL(u);
    st.uploaded=true;sv();R();
    toast("✓ Downloaded — send JSON to JD");
    return;
  }

  // Upload to Google Apps Script
  try{
    if(prog)prog.innerHTML=`<div class="upload-progress"><div class="upload-bar" style="width:30%"></div></div><div style="text-align:center;font-size:11px;color:#888;margin-top:4px">Uploading data + photos...</div>`;
    const resp=await fetch(UPLOAD_URL,{method:"POST",body:JSON.stringify(payload)});
    if(prog)prog.innerHTML=`<div class="upload-progress"><div class="upload-bar" style="width:100%"></div></div>`;
    if(resp.ok){
      st.uploaded=true;sv();R();toast("✓ Report uploaded!");
    }else{
      toast("⚠ Upload issue — try again or use Download");
    }
  }catch(e){
    if(prog)prog.innerHTML="";
    toast("⚠ Upload failed — use Download as backup");
  }
}

R();
</script>
</body>
</html>
