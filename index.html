<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>3923 Property Walkthrough</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--navy:#0A1F38;--navy2:#1E314F;--gold:#F9A61A;--lgold:#FBC05E;--r5:#22c55e;--r4:#60a5fa;--r3:#fbbf24;--r2:#f97316;--r1:#ef4444}
html,body{height:100%;overflow:hidden}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:#1a1a1a;display:flex;flex-direction:column}
input,textarea,button{font-family:inherit}
.app{display:flex;flex-direction:column;height:100dvh;height:100vh}
.topbar{position:sticky;top:0;z-index:50;background:var(--navy);padding:8px 12px;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.topbar-row{display:flex;justify-content:space-between;align-items:center}
.topbar-name{font-size:13px;font-weight:700;color:#fff}
.topbar-brand{font-size:10px;color:var(--lgold)}
.topbar-score{font-size:22px;font-weight:800;text-align:right}
.topbar-sub{font-size:9px;color:#aaa;text-align:right}
.sec-chips{display:flex;gap:3px;margin-top:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sec-chips::-webkit-scrollbar{display:none}
.chip{padding:3px 9px;border-radius:10px;border:none;cursor:pointer;font-size:10px;font-weight:600;white-space:nowrap;background:rgba(255,255,255,.1);color:#ccc;transition:all .15s}
.chip.active{background:var(--gold);color:var(--navy)}
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:56px}
.nav{position:sticky;bottom:0;z-index:50;background:#fff;border-top:1px solid #eee;display:flex;justify-content:space-around;padding:5px 0}
.nav-btn{display:flex;flex-direction:column;align-items:center;gap:0;background:none;border:none;cursor:pointer;padding:3px 6px;color:#bbb;position:relative;transition:color .15s}
.nav-btn.active{color:var(--navy)}
.nav-btn .icon{font-size:16px}
.nav-btn .label{font-size:9px;font-weight:400}
.nav-btn.active .label{font-weight:700}
.badge{position:absolute;top:0;right:-2px;background:var(--r1);color:#fff;font-size:8px;font-weight:700;border-radius:8px;padding:0 4px;line-height:14px}
.page{padding:14px;max-width:480px;margin:0 auto;width:100%}
.page-title{font-size:22px;font-weight:800;color:var(--navy);text-align:center}
.page-sub{font-size:12px;color:var(--gold);font-weight:600;text-align:center;margin-bottom:16px}
.field{margin-bottom:8px}
.field label{font-size:10px;font-weight:600;color:#888;display:block;margin-bottom:2px}
.field input,.field textarea{width:100%;padding:9px;border-radius:7px;border:1px solid #ddd;font-size:13px;box-sizing:border-box}
.field textarea{resize:vertical}
.btn{width:100%;padding:13px;border-radius:9px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn-navy{background:var(--navy);color:#fff}
.btn-gold{background:var(--gold);color:var(--navy)}
.btn-outline{background:#fff;color:#888;border:1px solid #ddd}
.btn-row{display:flex;gap:8px;margin-top:8px}
.sec-header{padding:10px 12px 6px;border-bottom:2px solid var(--gold);display:flex;justify-content:space-between;align-items:center}
.sec-title{font-size:15px;font-weight:700;color:var(--navy)}
.sec-pct{font-size:13px;font-weight:700;padding:2px 8px;border-radius:10px}
.item{padding:9px 12px;border-bottom:1px solid #eee;transition:background .15s}
.item.warn{background:#fffbeb}
.item.danger{background:#fef2f2}
.item-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.item-info{flex:1;min-width:0}
.item-code{font-size:10px;color:#bbb;font-weight:700;letter-spacing:.5px}
.item-label{font-size:13px;line-height:1.3}
.rbtns{display:flex;gap:3px}
.rbtn{width:34px;height:34px;border-radius:7px;border:none;cursor:pointer;font-size:14px;font-weight:700;background:#f0f0f0;color:#aaa;transition:all .12s}
.rbtn.s1{background:var(--r1);color:#fff;transform:scale(1.08);box-shadow:0 2px 8px rgba(239,68,68,.25)}
.rbtn.s2{background:var(--r2);color:#fff;transform:scale(1.08);box-shadow:0 2px 8px rgba(249,115,22,.25)}
.rbtn.s3{background:var(--r3);color:#fff;transform:scale(1.08);box-shadow:0 2px 8px rgba(251,191,36,.25)}
.rbtn.s4{background:var(--r4);color:#fff;transform:scale(1.08);box-shadow:0 2px 8px rgba(96,165,250,.25)}
.rbtn.s5{background:var(--r5);color:#fff;transform:scale(1.08);box-shadow:0 2px 8px rgba(34,197,94,.25)}
.item-actions{display:flex;gap:5px;margin-top:5px}
.tag{font-size:10px;padding:2px 7px;border-radius:4px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer}
.tag.filled-navy{background:var(--navy);color:#fff;border-color:var(--navy)}
.tag.filled-gold{background:var(--gold);color:#fff;border-color:var(--gold)}
.room-tabs{display:flex;gap:3px;padding:8px 12px;border-bottom:2px solid var(--gold)}
.room-tab{flex:1;padding:6px 0;border-radius:7px;border:none;cursor:pointer;text-align:center;font-size:13px;font-weight:700;background:#f0f0f0;color:#888;transition:all .15s}
.room-tab.active{background:var(--navy);color:#fff}
.room-tab-pct{font-size:9px;font-weight:400;opacity:.7}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;width:100%;max-width:480px;border-radius:14px 14px 0 0;padding:18px}
.modal-title{font-size:14px;font-weight:700;color:var(--navy);margin-bottom:10px}
.bucket-row{display:flex;gap:8px;margin-bottom:12px}
.bucket-btn{flex:1;padding:10px 0;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-weight:700;background:#f0f0f0;color:#888;text-align:center;transition:all .15s}
.bucket-btn.active{background:var(--gold);color:#fff}
.bucket-btn small{display:block;font-size:10px;font-weight:400}
.plan-bucket{margin-bottom:14px}
.plan-label{font-size:12px;font-weight:700;padding:5px 9px;border-radius:5px;margin-bottom:5px}
.plan-item{padding:7px 9px;border-left:3px solid;margin-bottom:3px;background:#fafafa;border-radius:0 5px 5px 0}
.plan-item-title{font-size:12px;font-weight:600;color:var(--navy)}
.plan-item-title span{color:#bbb}
.plan-item-meta{font-size:10px;color:#999;margin-top:1px}
.plan-item-note{font-size:10px;color:#777;margin-top:1px;font-style:italic}
.plan-item-row{display:flex;justify-content:space-between;align-items:center}
.export-card{background:linear-gradient(135deg,#0A1F38,#1E314F);border-radius:12px;padding:18px;margin-bottom:14px;color:#fff}
.export-prop{font-size:12px;color:var(--lgold);margin-bottom:3px}
.export-score{font-size:42px;font-weight:800}
.export-label{font-size:13px;color:#ccc}
.export-meta{font-size:11px;color:#999;margin-top:3px}
.q-label{font-size:12px;font-weight:600;color:var(--navy);display:block;margin-bottom:3px}
</style>
</head>
<body>
<div id="app" class="app"></div>
<script>
// ─── DATA ────────────────────────────────────────────
const SECTIONS=[
{id:"ext",code:"1",name:"Exterior & Arrival",items:["Building exterior / façade condition","Signage — visible, lit, brand-compliant","Parking lot — condition, striping, lighting","Landscaping and curb appeal","Entrance — clean, well-lit, doors functional","Exterior lighting operational","Trash receptacles clean, not overflowing","Overall curb appeal — would you pull in?"]},
{id:"lob",code:"2",name:"Lobby & Check-In",items:["First impression — smell, temp, lighting, music","Floors — condition, cleanliness, transitions","Front desk — clean, organized, staffed","Staff — uniform, greeting, professionalism","Lobby furniture and décor — condition","Elevator — cab condition, buttons, lighting","Public restrooms — clean, stocked, fixtures","Wayfinding signage — clear and current","Business center / market / vending","Ambient feel — would you sit in this lobby?"]},
{id:"cor",code:"3",name:"Corridors & Common",items:["Corridor flooring — stains, wear, transitions","Walls — scuffs, marks, paint condition","Lighting — all bulbs, fixture condition","Exit signs and emergency lighting","Ice / vending areas — clean, functional","Stairwells — clean, lit, signage","Elevator lobbies on guest floors","HK carts — tidy, stocked, not blocking","Noise — HVAC, neighbors, exterior"]},
{id:"fb",code:"5",name:"F&B / Breakfast",items:["Serving area — clean, organized, stocked","Food presentation and quality","Equipment — coffee, toaster, waffle maker","Dining area — tables, chairs, cleanliness","Kitchen / prep — food safety, temps, storage","Staff hygiene and health postings","Pest evidence — none observed"]},
{id:"fit",code:"6",name:"Fitness / Pool",items:["Fitness equipment — functional, clean","Fitness center — mirrors, TV, supplies","Pool — water clarity, chemical compliance","Pool deck and furniture condition","Safety signage and equipment","Towels stocked, hours posted, access works"]},
{id:"boh",code:"7",name:"Back of House",items:["HK storage — organized, stocked, clean","Laundry — equipment, organization","Chemical storage — labeled, SDS, compliant","Maintenance shop — organized, tools","Employee areas — break room, lockers","Office — organized, secure, data protected","Waste / dumpster — contained, clean"]},
{id:"mep",code:"8",name:"MEP & Systems",items:["Electrical panels — labeled, accessible","Generator — tested, fuel, logs current","Boiler / water heater — condition, age","HVAC units — filters, PM schedule","Roof — last inspection, visible issues","Plumbing — no leaks, pressure adequate","Elevator certificate current","PM program — documented, on schedule"]},
{id:"saf",code:"9",name:"Life Safety",items:["Fire alarm — tested, panel clear","Sprinkler — inspections current","Fire extinguishers — tagged, accessible","Emergency exits — clear, marked, lit","Emergency lighting — all functional","ADA compliance — rooms, signage, paths","CCTV and key control procedures"]}
];
const RITEMS=["Door, lock, hardware, peephole","First impression — smell, temp, cleanliness","Carpet / flooring condition","Walls, ceiling, baseboards","Bed — linens, mattress, pillows, frame","Furniture — nightstands, desk, dresser","TV, remote, programming","HVAC — functional, quiet, filter","Windows, blinds, curtains","Closet — hangers, iron, safe, rack","Lighting — all fixtures, outlets, USB","Bathroom — cleanliness, fixtures, function","Grout, caulking, tile condition","Amenities — toiletries, towels, dryer","Mini-fridge / coffee maker","Odors — none present","In-room collateral current"];
const RL=["A","B","C","D","E"];
const AQS=["What stood out positively?","What would embarrass us in front of an investor?","Worse since last visit?","Improved since last visit?","Where is the GM winning?","Where does the GM need support?","Biggest threat to guest satisfaction?","Fix before we leave today:"];
 
// ─── STATE ───────────────────────────────────────────
let state={
  view:"setup",secIdx:0,roomIdx:0,noteKey:null,actKey:null,
  info:{property:"",brand:"",date:new Date().toISOString().split("T")[0],gm:"",agm:"",rmgr:"",inspector:"",occ:"",qa:""},
  ratings:{},notes:{},actions:{},assessments:{},
  followUp:{d30:"",d90:"",next:""}
};
 
// Try restore from sessionStorage
try{const saved=sessionStorage.getItem("wt3923");if(saved){const p=JSON.parse(saved);Object.assign(state,p);}}catch(e){}
 
function save(){try{sessionStorage.setItem("wt3923",JSON.stringify(state));}catch(e){}}
function S(updates){Object.assign(state,updates);save();render();}
 
// ─── HELPERS ─────────────────────────────────────────
function sc(pfx,cnt){let s=0,t=0;for(let i=0;i<cnt;i++){const r=state.ratings[`${pfx}-${i}`];if(r){s+=r;t++;}}return{s,t,mx:cnt*5};}
function tot(){let s=0,mx=0;SECTIONS.forEach(sec=>{const c=sc(sec.id,sec.items.length);s+=c.s;mx+=c.mx;});RL.forEach(l=>{const c=sc(`room-${l}`,RITEMS.length);if(c.t>0){s+=c.s;mx+=c.mx;}});return{s,mx,pct:mx>0?Math.round((s/mx)*100):0};}
function flags(){const f=[];SECTIONS.forEach(sec=>sec.items.forEach((item,i)=>{const k=`${sec.id}-${i}`,r=state.ratings[k];if(r&&r<=3)f.push({k,sec:sec.name,code:`${sec.code}.${i+1}`,item,r,note:state.notes[k]||"",act:state.actions[k]||{}});}));RL.forEach(l=>RITEMS.forEach((item,i)=>{const k=`room-${l}-${i}`,r=state.ratings[k];if(r&&r<=3)f.push({k,sec:`Room ${l}`,code:`R${l}.${i+1}`,item,r,note:state.notes[k]||"",act:state.actions[k]||{}});}));return f;}
function pc(p){return p>=90?"var(--r5)":p>=75?"var(--r4)":p>=60?"var(--r3)":"var(--r1)";}
function pl(p){return p>=90?"Excellent":p>=75?"Good":p>=60?"Fair":"Unsatisfactory";}
function e(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
 
// ─── RENDER ──────────────────────────────────────────
function render(){
  const t=tot(),fl=flags();
  let h="";
 
  // Top bar (not on setup)
  if(state.view!=="setup"){
    h+=`<div class="topbar"><div class="topbar-row"><div><div class="topbar-name">${e(state.info.property)||"Property Walkthrough"}</div><div class="topbar-brand">3923 Management</div></div><div><div class="topbar-score" style="color:${t.mx>0?pc(t.pct):"#666"}">${t.mx>0?t.pct+"%":"—"}</div><div class="topbar-sub">${t.mx>0?t.s+"/"+t.mx:"Start scoring"}</div></div></div>`;
    if(state.view==="walk"){
      h+=`<div class="sec-chips">`;
      SECTIONS.forEach((s,i)=>{h+=`<button class="chip${state.secIdx===i?" active":""}" onclick="S({secIdx:${i}})">${s.code}</button>`;});
      h+=`</div>`;
    }
    h+=`</div>`;
  }
 
  // Content
  h+=`<div class="content">`;
  if(state.view==="setup") h+=renderSetup();
  else if(state.view==="walk") h+=renderWalk();
  else if(state.view==="rooms") h+=renderRooms();
  else if(state.view==="assess") h+=renderAssess();
  else if(state.view==="plan") h+=renderPlan(fl);
  else if(state.view==="export") h+=renderExport(t,fl);
  h+=`</div>`;
 
  // Nav
  const tabs=[["setup","⚙️","Setup"],["walk","🏨","Walk"],["rooms","🛏️","Rooms"],["assess","💬","Assess"],["plan","📋","Plan"],["export","📤","Export"]];
  h+=`<div class="nav">`;
  tabs.forEach(([v,ic,lb])=>{
    h+=`<button class="nav-btn${state.view===v?" active":""}" onclick="S({view:'${v}'})"><span class="icon">${ic}</span><span class="label">${lb}</span>`;
    if(v==="plan"&&fl.length>0)h+=`<span class="badge">${fl.length}</span>`;
    h+=`</button>`;
  });
  h+=`</div>`;
 
  // Modals
  if(state.noteKey) h+=renderNoteModal();
  if(state.actKey) h+=renderActModal();
 
  document.getElementById("app").innerHTML=h;
 
  // Focus textareas in modals
  if(state.noteKey){const ta=document.getElementById("note-ta");if(ta){ta.focus();ta.selectionStart=ta.value.length;}}
  if(state.actKey){const inp=document.getElementById("act-inp");if(inp&&!state.actions[state.actKey]?.bucket){}else if(inp){inp.focus();}}
}
 
function renderSetup(){
  const fields=[["property","Property Name"],["brand","Brand / Tier"],["date","Date","date"],["gm","General Manager"],["agm","Accountability Partner GM"],["rmgr","Regional Manager"],["inspector","Your Name"],["occ","Current Occupancy"],["qa","Last QA Score / Date"]];
  let h=`<div class="page"><div class="page-title">Property Walkthrough</div><div class="page-sub">3923 Management</div>`;
  fields.forEach(([k,l,type])=>{
    h+=`<div class="field"><label>${l}</label><input type="${type||"text"}" value="${e(state.info[k])}" oninput="updInfo('${k}',this.value)"></div>`;
  });
  h+=`<button class="btn btn-navy" style="margin-top:10px" onclick="S({view:'walk'})">Start Walkthrough →</button>`;
  h+=`<button class="btn btn-outline" style="margin-top:8px" onclick="resetAll()">Reset All Data</button>`;
  h+=`</div>`;
  return h;
}
 
function renderWalk(){
  const sec=SECTIONS[state.secIdx],s=sc(sec.id,sec.items.length);
  const p=s.t>0?Math.round((s.s/(s.t*5))*100):null;
  let h=`<div style="max-width:480px;margin:0 auto">`;
  h+=`<div class="sec-header"><div class="sec-title">${sec.code}. ${sec.name}</div>`;
  if(p!==null)h+=`<div class="sec-pct" style="color:${pc(p)};background:${pc(p)}15">${p}%</div>`;
  h+=`</div>`;
  sec.items.forEach((item,i)=>{h+=renderItem(`${sec.id}-${i}`,item,`${sec.code}.${i+1}`);});
  h+=`<div class="btn-row" style="padding:12px">`;
  if(state.secIdx>0)h+=`<button class="btn btn-outline" style="flex:1" onclick="S({secIdx:${state.secIdx-1}})">← Prev</button>`;
  if(state.secIdx<SECTIONS.length-1)h+=`<button class="btn btn-navy" style="flex:1" onclick="S({secIdx:${state.secIdx+1}})">Next →</button>`;
  else h+=`<button class="btn btn-gold" style="flex:1" onclick="S({view:'rooms'})">Rooms →</button>`;
  h+=`</div></div>`;
  return h;
}
 
function renderRooms(){
  const l=RL[state.roomIdx],s=sc(`room-${l}`,RITEMS.length);
  const p=s.t>0?Math.round((s.s/(s.t*5))*100):null;
  let h=`<div style="max-width:480px;margin:0 auto"><div class="room-tabs">`;
  RL.forEach((lt,i)=>{
    const rs=sc(`room-${lt}`,RITEMS.length),rp=rs.t>0?Math.round((rs.s/(rs.t*5))*100):null;
    h+=`<button class="room-tab${state.roomIdx===i?" active":""}" onclick="S({roomIdx:${i}})">${lt}${rp!==null?`<div class="room-tab-pct">${rp}%</div>`:""}</button>`;
  });
  h+=`</div>`;
  h+=`<div style="padding:6px 12px;display:flex;justify-content:space-between;align-items:center"><div style="font-size:14px;font-weight:700;color:var(--navy)">Room ${l}</div>`;
  if(p!==null)h+=`<div class="sec-pct" style="color:${pc(p)};background:${pc(p)}15">${p}%</div>`;
  h+=`</div>`;
  RITEMS.forEach((item,i)=>{h+=renderItem(`room-${l}-${i}`,item,`R${l}.${i+1}`);});
  h+=`<div class="btn-row" style="padding:12px"><button class="btn btn-outline" style="flex:1" onclick="S({view:'walk'})">← Walk</button><button class="btn btn-navy" style="flex:1" onclick="S({view:'assess'})">Assessment →</button></div></div>`;
  return h;
}
 
function renderItem(k,label,code){
  const r=state.ratings[k],hn=state.notes[k],ha=state.actions[k];
  const cls=r&&r<=2?"danger":r===3?"warn":"";
  let h=`<div class="item ${cls}"><div class="item-top"><div class="item-info"><div class="item-code">${code}</div><div class="item-label">${e(label)}</div></div><div class="rbtns">`;
  for(let n=1;n<=5;n++){h+=`<button class="rbtn${r===n?" s"+n:""}" onclick="rate('${k}',${n})">${n}</button>`;}
  h+=`</div></div>`;
  if(r){
    h+=`<div class="item-actions">`;
    h+=`<button class="tag${hn?" filled-navy":""}" onclick="S({noteKey:'${k}'})">${hn?"✎ Note":"+ Note"}</button>`;
    if(r<=3){h+=`<button class="tag${ha&&ha.bucket?" filled-gold":""}" onclick="S({actKey:'${k}'})">${ha&&ha.bucket?ha.bucket+" · "+(ha.owner||"?"):"+ Action"}</button>`;}
    h+=`</div>`;
  }
  h+=`</div>`;
  return h;
}
 
function renderAssess(){
  let h=`<div class="page"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px">Overall Assessment</div><div style="font-size:11px;color:#999;margin-bottom:14px">Complete as a team after the walkthrough.</div>`;
  AQS.forEach((q,i)=>{
    h+=`<div style="margin-bottom:10px"><label class="q-label">${e(q)}</label><textarea rows="2" placeholder="..." oninput="updAssess(${i},this.value)">${e(state.assessments[i]||"")}</textarea></div>`;
  });
  h+=`<button class="btn btn-navy" onclick="S({view:'plan'})">View Action Plan →</button></div>`;
  return h;
}
 
function renderPlan(fl){
  let h=`<div class="page"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:3px">Action Plan</div><div style="font-size:11px;color:#999;margin-bottom:10px">Auto-populated from items rated 3 or below. ${fl.length} flagged.</div>`;
  const buckets=[["M","This Month (30d)","#fef3c7","#92400e"],["Q","This Quarter (90d)","#dbeafe","#1e40af"],["C","Future CapEx","#f3e8ff","#6b21a8"]];
  buckets.forEach(([b,lb,bg,fg])=>{
    const items=fl.filter(f=>f.act.bucket===b);
    h+=`<div class="plan-bucket"><div class="plan-label" style="background:${bg};color:${fg}">${lb} (${items.length})</div>`;
    if(!items.length)h+=`<div style="font-size:11px;color:#ddd;padding:3px 9px">None assigned</div>`;
    items.forEach(f=>{
      const bc=f.r===1?"var(--r1)":f.r===2?"var(--r2)":"var(--r3)";
      h+=`<div class="plan-item" style="border-color:${bc}"><div class="plan-item-title"><span>${f.code}</span> ${e(f.item)}</div><div class="plan-item-meta">Rating: ${f.r} · ${e(f.sec)}${f.act.owner?" · "+e(f.act.owner):""}</div>`;
      if(f.note)h+=`<div class="plan-item-note">${e(f.note)}</div>`;
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  const unassigned=fl.filter(f=>!f.act.bucket);
  if(unassigned.length){
    h+=`<div class="plan-bucket"><div class="plan-label" style="background:#fee2e2;color:#991b1b">Unassigned (${unassigned.length})</div>`;
    unassigned.forEach(f=>{
      const bc=f.r===1?"var(--r1)":f.r===2?"var(--r2)":"var(--r3)";
      h+=`<div class="plan-item" style="border-color:${bc}"><div class="plan-item-row"><div><div class="plan-item-title"><span>${f.code}</span> ${e(f.item)}</div><div class="plan-item-meta">Rating: ${f.r} · ${e(f.sec)}</div></div><button class="tag" onclick="S({actKey:'${f.k}'})">Assign</button></div></div>`;
    });
    h+=`</div>`;
  }
  h+=`<div class="btn-row"><button class="btn btn-outline" style="flex:1" onclick="S({view:'assess'})">← Assessment</button><button class="btn btn-gold" style="flex:1" onclick="S({view:'export'})">Export →</button></div></div>`;
  return h;
}
 
function renderExport(t,fl){
  let h=`<div class="page"><div style="font-size:16px;font-weight:700;color:var(--navy);margin-bottom:14px">Export Report</div>`;
  h+=`<div class="export-card"><div class="export-prop">${e(state.info.property)||"Property"}</div><div class="export-score" style="color:${pc(t.pct)}">${t.pct}%</div><div class="export-label">${t.s} / ${t.mx} — ${pl(t.pct)}</div><div class="export-meta">${fl.length} action items · ${fl.filter(f=>f.act.bucket).length} assigned</div></div>`;
  h+=`<div style="font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px">Follow-Up Schedule</div>`;
  [["d30","30-Day Check-In"],["d90","90-Day Check-In"],["next","Next Full Walkthrough"]].forEach(([k,l])=>{
    h+=`<div class="field"><label>${l}</label><input type="date" value="${state.followUp[k]}" oninput="updFU('${k}',this.value)"></div>`;
  });
  h+=`<div class="btn-row" style="margin-top:14px"><button class="btn btn-navy" style="flex:1" onclick="copyReport()">📋 Copy</button><button class="btn btn-gold" style="flex:1" onclick="dlReport()">⬇ Download</button></div>`;
  h+=`<button class="btn" style="margin-top:8px;background:#1E314F;color:#fff;width:100%" onclick="emailReport()">✉ Email Report to JD</button>`;
  h+=`</div>`;
  return h;
}
 
function renderNoteModal(){
  return `<div class="modal-bg" onclick="S({noteKey:null})"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Notes</div><textarea id="note-ta" placeholder="What did you see?" oninput="updNote(this.value)" style="width:100%;min-height:70px;border-radius:8px;border:1px solid #ddd;padding:10px;font-size:14px;box-sizing:border-box;resize:vertical">${e(state.notes[state.noteKey]||"")}</textarea><button class="btn btn-navy" style="margin-top:8px" onclick="S({noteKey:null})">Done</button></div></div>`;
}
 
function renderActModal(){
  const a=state.actions[state.actKey]||{};
  let h=`<div class="modal-bg" onclick="S({actKey:null})"><div class="modal" onclick="event.stopPropagation()"><div class="modal-title">Action Item</div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:5px">Bucket</div><div class="bucket-row">`;
  [["M","Month"],["Q","Quarter"],["C","CapEx"]].forEach(([v,l])=>{
    h+=`<button class="bucket-btn${a.bucket===v?" active":""}" onclick="updAct('bucket','${v}')">${v}<small>${l}</small></button>`;
  });
  h+=`</div><div style="font-size:11px;font-weight:600;color:#888;margin-bottom:4px">Owner</div><input id="act-inp" value="${e(a.owner||"")}" placeholder="Who owns this?" oninput="updAct('owner',this.value)" style="width:100%;padding:10px;border-radius:8px;border:1px solid #ddd;font-size:14px;box-sizing:border-box;margin-bottom:8px"><button class="btn btn-navy" onclick="S({actKey:null})">Done</button></div></div>`;
  return h;
}
 
// ─── ACTIONS ─────────────────────────────────────────
function rate(k,v){state.ratings[k]=state.ratings[k]===v?undefined:v;save();render();}
function updInfo(k,v){state.info[k]=v;save();}
function updNote(v){state.notes[state.noteKey]=v;save();}
function updAct(field,v){if(!state.actions[state.actKey])state.actions[state.actKey]={};state.actions[state.actKey][field]=v;save();if(field!=="owner")render();}
function updAssess(i,v){state.assessments[i]=v;save();}
function updFU(k,v){state.followUp[k]=v;save();}
function resetAll(){if(confirm("Reset all walkthrough data? This cannot be undone.")){sessionStorage.removeItem("wt3923");state={view:"setup",secIdx:0,roomIdx:0,noteKey:null,actKey:null,info:{property:"",brand:"",date:new Date().toISOString().split("T")[0],gm:"",agm:"",rmgr:"",inspector:"",occ:"",qa:""},ratings:{},notes:{},actions:{},assessments:{},followUp:{d30:"",d90:"",next:""}};render();}}
 
function genReport(){
  const t=tot(),fl=flags();
  let r=`3923 MANAGEMENT — PROPERTY WALKTHROUGH\n${"=".repeat(50)}\n\nProperty: ${state.info.property}\nBrand: ${state.info.brand}\nDate: ${state.info.date}\nGM: ${state.info.gm}\nAccountability GM: ${state.info.agm}\nRegional Mgr: ${state.info.rmgr}\nInspector: ${state.info.inspector}\nOccupancy: ${state.info.occ}\nLast QA: ${state.info.qa}\n\nOVERALL SCORE: ${t.s}/${t.mx} (${t.pct}%) — ${pl(t.pct)}\n${"-".repeat(50)}\n\nSECTION SCORES\n`;
  SECTIONS.forEach(sec=>{const s=sc(sec.id,sec.items.length);const p=s.t>0?Math.round((s.s/(s.t*5))*100):0;r+=`  ${sec.code}. ${sec.name}: ${s.s}/${s.mx} (${p}%)\n`;});
  RL.forEach(l=>{const s=sc(`room-${l}`,RITEMS.length);if(s.t>0)r+=`  Room ${l}: ${s.s}/${s.mx} (${Math.round((s.s/(s.t*5))*100)}%)\n`;});
  r+=`\n${"=".repeat(50)}\nDETAILED RATINGS\n${"=".repeat(50)}\n\n`;
  SECTIONS.forEach(sec=>{r+=`${sec.code}. ${sec.name}\n`;sec.items.forEach((item,i)=>{const k=`${sec.id}-${i}`,rt=state.ratings[k];if(rt){r+=`  ${sec.code}.${i+1} [${rt}] ${item}`;if(state.notes[k])r+=` — ${state.notes[k]}`;r+="\n";}});r+="\n";});
  RL.forEach(l=>{const s=sc(`room-${l}`,RITEMS.length);if(s.t>0){r+=`Room ${l}\n`;RITEMS.forEach((item,i)=>{const k=`room-${l}-${i}`,rt=state.ratings[k];if(rt){r+=`  R${l}.${i+1} [${rt}] ${item}`;if(state.notes[k])r+=` — ${state.notes[k]}`;r+="\n";}});r+="\n";}});
  r+=`${"=".repeat(50)}\nACTION PLAN (${fl.length} items)\n${"=".repeat(50)}\n\n`;
  ["M","Q","C"].forEach(b=>{const lb=b==="M"?"THIS MONTH (30d)":b==="Q"?"THIS QUARTER (90d)":"FUTURE CAPEX";const items=fl.filter(f=>f.act.bucket===b);r+=`${lb} (${items.length})\n`;items.forEach(f=>{r+=`  [${f.r}] ${f.code} ${f.item}${f.act.owner?" — Owner: "+f.act.owner:""}\n`;if(f.note)r+=`      Note: ${f.note}\n`;});r+="\n";});
  const u=fl.filter(f=>!f.act.bucket);if(u.length){r+=`UNASSIGNED (${u.length})\n`;u.forEach(f=>{r+=`  [${f.r}] ${f.code} ${f.item}\n`;if(f.note)r+=`      Note: ${f.note}\n`;});r+="\n";}
  r+=`${"=".repeat(50)}\nOVERALL ASSESSMENT\n${"=".repeat(50)}\n\n`;
  AQS.forEach((q,i)=>{r+=`${q}\n${state.assessments[i]||"(not completed)"}\n\n`;});
  r+=`FOLLOW-UP\n30-Day: ${state.followUp.d30||"TBD"}\n90-Day: ${state.followUp.d90||"TBD"}\nNext Walk: ${state.followUp.next||"TBD"}\n\n"We take care of people." — Genesis 39:23\n`;
  return r;
}
 
function copyReport(){navigator.clipboard.writeText(genReport()).then(()=>alert("Report copied to clipboard!")).catch(()=>{const ta=document.createElement("textarea");ta.value=genReport();document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);alert("Report copied!");});}
 
function dlReport(){const b=new Blob([genReport()],{type:"text/plain"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`walkthrough_${(state.info.property||"report").replace(/\s+/g,"_")}_${state.info.date}.txt`;a.click();URL.revokeObjectURL(u);}
 
function emailReport(){
  const t=tot(),fl=flags();
  const to="johndavid@3923mgmt.com";
  const subj=`Walkthrough: ${state.info.property||"Property"} — ${t.pct}% (${pl(t.pct)}) — ${state.info.date}`;
  // Build a compact body that fits mailto limits
  let body=`PROPERTY WALKTHROUGH REPORT\n\nProperty: ${state.info.property}\nBrand: ${state.info.brand}\nDate: ${state.info.date}\nInspector: ${state.info.inspector}\nGM: ${state.info.gm}\n\nOVERALL SCORE: ${t.s}/${t.mx} (${t.pct}%) — ${pl(t.pct)}\n\n`;
  body+=`SECTION SCORES\n`;
  SECTIONS.forEach(sec=>{const s=sc(sec.id,sec.items.length);const p=s.t>0?Math.round((s.s/(s.t*5))*100):0;body+=`  ${sec.code}. ${sec.name}: ${p}%\n`;});
  RL.forEach(l=>{const s=sc(`room-${l}`,RITEMS.length);if(s.t>0)body+=`  Room ${l}: ${Math.round((s.s/(s.t*5))*100)}%\n`;});
  body+=`\nACTION ITEMS (${fl.length})\n`;
  ["M","Q","C"].forEach(b=>{const lb=b==="M"?"MONTH":b==="Q"?"QUARTER":"CAPEX";const items=fl.filter(f=>f.act.bucket===b);if(items.length){body+=`\n${lb}:\n`;items.forEach(f=>{body+=`  [${f.r}] ${f.code} ${f.item}${f.act.owner?" — "+f.act.owner:""}\n`;if(f.note)body+=`    ${f.note}\n`;});}});
  const u=fl.filter(f=>!f.act.bucket);if(u.length){body+=`\nUNASSIGNED:\n`;u.forEach(f=>{body+=`  [${f.r}] ${f.code} ${f.item}\n`;});}
  body+=`\nASSESSMENT\n`;
  AQS.forEach((q,i)=>{if(state.assessments[i])body+=`${q}\n${state.assessments[i]}\n\n`;});
  body+=`\n— "We take care of people." Genesis 39:23`;
  // Check length and truncate if needed
  const maxLen=1800;
  if(body.length>maxLen){body=body.substring(0,maxLen)+"\n\n[Report truncated — full version available via Copy or Download]";}
  const mailtoUrl=`mailto:${to}?subject=${encodeURIComponent(subj)}&body=${encodeURIComponent(body)}`;
  window.location.href=mailtoUrl;
}
 
// ─── INIT ────────────────────────────────────────────
render();
</script>
